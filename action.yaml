# DeepSeek Code Review Action
#   @author: hustcer
#   @created: 2025/01/29 13:05:20
# REF:
#   - https://docs.github.com/cn/actions/creating-actions/about-custom-actions
#   - https://docs.github.com/cn/actions/creating-actions/metadata-syntax-for-github-actions
#   - https://docs.github.com/en/actions/creating-actions/creating-a-composite-action

name: 'DeepSeek CR'
author: 'hustcer'
description: '🚀 Sharpen Your Code, Ship with Confidence – Elevate Your Workflow with DeepSeek Code Review 🚀'

branding:
  icon: 'eye'
  color: 'purple'

inputs:
  chat-token:
    required: true
    description: 'Your DeepSeek API token.'
  max-length:
    default: 0
    required: false
    description: 'The maximum length of the content for review, 0 means no limit.'
  model:
    required: false
    default: 'deepseek-v4-flash'
    description: 'The DeepSeek model to choose for code review.'
  temperature:
    required: false
    default: 0.3
    description: 'The temperature of the model.'
  base-url:
    required: false
    default: 'https://api.deepseek.com'
    description: 'The base url of DeepSeek API.'
  sys-prompt:
    required: false
    default: 'You are a professional code review assistant responsible for analyzing code changes in GitHub Pull Requests. Identify potential issues such as code style violations, logical errors, security vulnerabilities, and provide improvement suggestions. Clearly list the problems and recommendations in a concise manner.'
    description: 'The system prompt for DeepSeek API.'
  user-prompt:
    required: false
    default: 'Please review the following code changes'
    description: 'The user prompt for DeepSeek API.'
  include-patterns:
    required: false
    description: 'The comma separated file patterns to include in the code review.'
  exclude-patterns:
    required: false
    default: 'pnpm-lock.yaml,package-lock.json,*.lock'
    description: 'The comma separated file patterns to exclude in the code review.'
  github-token:
    required: false
    default: '${{ github.token }}'
    description: 'The GITHUB_TOKEN secret or personal access token to authenticate. Defaults to `github.token`.'
  watch-mention:
    required: false
    default: ''
    description: 'Trigger code review when this string is mentioned in a PR comment, e.g. `@github-actions`. Requires `issue_comment` event in the workflow.'
  allowed-associations:
    required: false
    default: 'OWNER,MEMBER,COLLABORATOR'
    description: 'Comma-separated author_association values allowed to trigger review via PR comment. Default: OWNER,MEMBER,COLLABORATOR.'
  single-review:
    required: false
    default: 'false'
    description: 'When true, keep only one AI review per PR and update it on every commit, showing which findings were resolved / newly introduced / still open. Default: false (one new review per commit, original behavior).'

runs:
  using: 'composite'
  steps:
    - name: Setup Nu
      uses: hustcer/setup-nu@v3.25
      with:
        version: 0.113.1

    - name: DeepSeek Code Review
      shell: nu {0}
      env:
        WATCH_MENTION: ${{ inputs.watch-mention }}
        CHAT_TOKEN_INPUT: ${{ inputs.chat-token }}
        MODEL_INPUT: ${{ inputs.model }}
        BASE_URL_INPUT: ${{ inputs.base-url }}
        SYS_PROMPT_INPUT: ${{ inputs.sys-prompt }}
        USER_PROMPT_INPUT: ${{ inputs.user-prompt }}
        INCLUDE_PATTERNS_INPUT: ${{ inputs.include-patterns }}
        EXCLUDE_PATTERNS_INPUT: ${{ inputs.exclude-patterns }}
        GH_TOKEN_INPUT: ${{ inputs.github-token }}
        MAX_LENGTH_INPUT: ${{ inputs.max-length }}
        TEMPERATURE_INPUT: ${{ inputs.temperature }}
        REPO_INPUT: ${{ github.repository }}
        ALLOWED_ASSOCIATIONS_INPUT: ${{ inputs.allowed-associations }}
        SINGLE_REVIEW_INPUT: ${{ inputs.single-review }}
        HEAD_SHA: ${{ github.head_sha }}
      run: |
        let event = (open $env.GITHUB_EVENT_PATH)
        let pr = $event.pull_request?.number? | default $event.issue?.number? | default '' | into string
        let watchMention = $env.WATCH_MENTION
        let commentBody = $event.comment?.body? | default ''
        if $env.GITHUB_EVENT_NAME == 'issue_comment' {
          if ($event.issue?.pull_request? | is-empty) {
            print 'Not a pull request comment, skipping.'
            exit 0
          }
          if ($event.sender?.type? == 'Bot') or ($event.sender?.login? | str ends-with '[bot]') {
            print 'Comment from bot, skipping to avoid infinite loop.'
            exit 0
          }
          if ($watchMention | is-empty) {
            print 'issue_comment trigger fired but no watch-mention configured, exiting.'
            exit 0
          }
          let allowed = $env.ALLOWED_ASSOCIATIONS_INPUT | split row ',' | str trim
          if ($event.comment?.author_association? not-in $allowed) {
            print 'Comment author lacks write access, skipping.'
            exit 0
          }
          let mentionPattern = [
            '(^|[^A-Za-z0-9_-])'
            ($watchMention | str escape-regex)
            '([^A-Za-z0-9_-]|$)'
          ] | str join
          if not ($commentBody =~ $mentionPattern) {
            print 'The comment does not mention the watch-mention string, exiting.'
            exit 0
          }
        }
        $env.PR_NUMBER_INPUT = $pr
        $env.COMMENT_BODY_INPUT = $commentBody
        # Let the child Nu parser receive the runtime container-side action path before `use`.
        ^nu -I ($env.GITHUB_ACTION_PATH | path join nu) -c "
          use review.nu *
          (deepseek-review $env.CHAT_TOKEN_INPUT
            --model $env.MODEL_INPUT
            --repo $env.REPO_INPUT
            --pr-number $env.PR_NUMBER_INPUT
            --gh-token $env.GH_TOKEN_INPUT
            --base-url $env.BASE_URL_INPUT
            --max-length (try { $env.MAX_LENGTH_INPUT | into int } catch { 0 })
            --sys-prompt $env.SYS_PROMPT_INPUT
            --user-prompt $env.USER_PROMPT_INPUT
            --temperature (try { $env.TEMPERATURE_INPUT | into float } catch { 0.3 })
            --include $env.INCLUDE_PATTERNS_INPUT
            --exclude $env.EXCLUDE_PATTERNS_INPUT
            --comment $env.COMMENT_BODY_INPUT
            --single-review ($env.SINGLE_REVIEW_INPUT | str down-case == 'true')
          )
        "
