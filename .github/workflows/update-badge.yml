name: Update Status Badges

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *'

permissions: 
  contents: write

jobs: 
  update:
    name: update_badges
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Configure Git
        run: |
          echo "Starting to configure git."
          git config --global user.name "AutoUpdater"
          git config --global user.email "user@localhost.localdomain"

      - name: Update the badge
        run: |
          #TODO: Update 3 badges logic.

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  
        run: |
          git add README.md
          git add README.zh-CN.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update status badges"
          git push origin main  
