name: Update Status Badges

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *'

permissions: 
  contents: write

jobs: 
  update:
    name: update_badges
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure Git
        run: |
          git config --global user.name "AutoUpdater[bot]"
          git config --global user.email "user@localhost.localdomain"

      - name: Update the badge
        run: |
          SUMMARY=$(curl -fsSL "https://gist.githubusercontent.com/hustcer/b99391ee59016b17d0befe3331387e89/raw/test-summary.json")
          TOTAL=$(echo "$SUMMARY" | jq -r '.total')
          PASSED=$(echo "$SUMMARY" | jq -r '.passed')
          FAILED=$(echo "$SUMMARY" | jq -r '.failed')
          SKIPPED=$(echo "$SUMMARY" | jq -r '.skipped')

          echo "Tests: total=${TOTAL}, passed=${PASSED}, failed=${FAILED}, skipped=${SKIPPED}"

          for FILE in README.md README.zh-CN.md; do
            sed -i "s|^!\[Tests\](.*|![Tests](https://img.shields.io/badge/Tests-${TOTAL}-blue)|" "$FILE"
            sed -i "s|^!\[Passed\](.*|![Passed](https://img.shields.io/badge/Passed-${PASSED}-success)|" "$FILE"
            sed -i "s|^!\[Failed\](.*|![Failed](https://img.shields.io/badge/Failed-${FAILED}-critical)|" "$FILE"
            sed -i "s|^!\[Skipped\](.*|![Skipped](https://img.shields.io/badge/Skipped-${SKIPPED}-yellow)|" "$FILE"
          done

      - name: Commit and Push
        run: |
          git checkout main
          git add README.md README.zh-CN.md
          if git diff --quiet && git diff --staged --quiet; then
            echo "No badge changes detected, skipping push."
            exit 0
          fi
          git commit -m "chore: update status badges [skip ci]"
          git push -u origin main
